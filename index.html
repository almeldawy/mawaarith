<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Mawārīth Expert - Édition Al-Muhaqqiq</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        :root { --emerald-deep: #064e3b; }

        .dark body { background-color: #020617; color: #f8fafc; }
        html:not(.dark) body { background-color: #f8fafc; color: #0f172a; }

        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s; }
        .arabic { font-family: 'Amiri', serif; }

        .glass-card {
            backdrop-filter: blur(12px);
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        html:not(.dark) .glass-card {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .input-premium {
            background: rgba(2, 6, 23, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: inherit;
        }
        html:not(.dark) .input-premium {
            background: #fff;
            border: 1px solid #e2e8f0;
        }

        .theme-toggle { position: fixed; top: 1.5rem; right: 1.5rem; z-index: 100; }
        
        .tab-active { border-bottom: 2px solid #10b981; color: #10b981; }
    </style>
</head>
<body class="min-h-screen">

    <div class="theme-toggle">
        <button onclick="toggleTheme()" class="p-3 rounded-2xl glass-card border border-emerald-500/20 text-emerald-500 hover:scale-110 active:scale-95 transition-all">
            <i id="theme-icon" class="fa-solid fa-moon text-xl"></i>
        </button>
    </div>

    <div class="max-w-6xl mx-auto px-4 py-8 md:py-12">
        <header class="text-center mb-12">
            <h1 class="text-4xl md:text-6xl font-black mb-4">
                <span class="bg-clip-text text-transparent bg-gradient-to-r from-emerald-500 to-teal-300">Al-Muhaqqiq</span>
                <span class="arabic text-emerald-500 ml-2">المُحقِّق</span>
            </h1>
            <p class="text-slate-500 dark:text-slate-400 font-light">Calcul de précision avec gestion de l'Awl (العول) et du Radd (الرد).</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Saisie -->
            <div class="lg:col-span-7 space-y-6">
                
                <!-- Actifs -->
                <section class="glass-card rounded-3xl p-6">
                    <h2 class="text-sm font-black uppercase text-emerald-500 mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-coins"></i> Patrimoine Net
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <span class="text-[10px] text-slate-400">Actif Total (€)</span>
                            <input type="number" id="total_assets" oninput="updateNet()" class="input-premium w-full p-3 rounded-xl font-bold">
                        </div>
                        <div class="space-y-1">
                            <span class="text-[10px] text-slate-400">Dettes & Testament (€)</span>
                            <input type="number" id="total_debts" oninput="updateNet()" class="input-premium w-full p-3 rounded-xl font-bold border-red-500/20">
                        </div>
                    </div>
                </section>

                <!-- Configuration Humaine -->
                <section class="glass-card rounded-3xl p-6 space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="setGender('male')" id="gm" class="p-4 rounded-2xl border-2 border-blue-500 bg-blue-500/10 flex flex-col items-center">
                            <i class="fa-solid fa-mars text-blue-500 mb-1"></i><span class="text-[10px] font-bold">DÉFUNT HOMME</span>
                        </button>
                        <button onclick="setGender('female')" id="gf" class="p-4 rounded-2xl border-2 border-transparent bg-slate-100 dark:bg-slate-900 flex flex-col items-center">
                            <i class="fa-solid fa-venus text-pink-500 mb-1"></i><span class="text-[10px] font-bold">DÉFUNTE FEMME</span>
                        </button>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <span id="spouse_label" class="text-[10px] text-slate-400">Épouse(s)</span>
                            <input type="number" id="nb_spouses" value="0" class="input-premium w-full p-2 rounded-xl text-center font-bold">
                        </div>
                        <div class="space-y-1">
                            <span class="text-[10px] text-slate-400">Fils / Filles</span>
                            <div class="flex gap-2">
                                <input type="number" id="nb_sons" placeholder="Fils" class="input-premium w-1/2 p-2 rounded-xl text-center">
                                <input type="number" id="nb_dau" placeholder="Filles" class="input-premium w-1/2 p-2 rounded-xl text-center">
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-4 rounded-2xl border border-white/5 bg-slate-500/5">
                            <span class="text-[10px] font-bold text-amber-500 block mb-2 uppercase">Ascendants</span>
                            <div class="space-y-2">
                                <label class="flex items-center gap-2 text-xs"><input type="checkbox" id="fth_alive" onchange="toggleGP()"> Père</label>
                                <label class="flex items-center gap-2 text-xs"><input type="checkbox" id="mth_alive" onchange="toggleGP()"> Mère</label>
                                <div id="gp_section" class="pt-2 border-t border-white/5 space-y-2">
                                    <label class="flex items-center gap-2 text-xs opacity-60"><input type="checkbox" id="gfh_alive"> G-Père Pat.</label>
                                    <label class="flex items-center gap-2 text-xs opacity-60"><input type="checkbox" id="gmh_alive"> G-Mère</label>
                                </div>
                            </div>
                        </div>
                        <div class="p-4 rounded-2xl border border-white/5 bg-slate-500/5">
                            <span class="text-[10px] font-bold text-blue-500 block mb-2 uppercase">Fratrie</span>
                            <div class="space-y-2">
                                <div class="flex gap-1"><input type="number" id="nb_fg" placeholder="G" class="input-premium w-1/2 p-1 text-xs rounded text-center"><input type="number" id="nb_sg" placeholder="G" class="input-premium w-1/2 p-1 text-xs rounded text-center"></div>
                                <div class="flex gap-1"><input type="number" id="nb_fc" placeholder="C" class="input-premium w-1/2 p-1 text-xs rounded text-center"><input type="number" id="nb_sc" placeholder="C" class="input-premium w-1/2 p-1 text-xs rounded text-center"></div>
                                <input type="number" id="nb_ut" placeholder="Utérins (Total)" class="input-premium w-full p-1 text-xs rounded text-center">
                            </div>
                        </div>
                    </div>
                </section>

                <button onclick="calculate()" class="w-full py-5 bg-emerald-600 hover:bg-emerald-500 text-white font-black rounded-3xl shadow-xl transition-all">
                    EXÉCUTER LE PARTAGE JURIDIQUE
                </button>
            </div>

            <!-- Résultats -->
            <div class="lg:col-span-5">
                <div id="results-box" class="glass-card rounded-3xl p-6 sticky top-8 hidden">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-black">Répartition</h2>
                        <span id="badge-status" class="text-[8px] px-2 py-1 rounded bg-emerald-500/20 text-emerald-400 font-bold uppercase tracking-widest">Normal</span>
                    </div>
                    
                    <div id="results-list" class="space-y-3 mb-6"></div>

                    <div class="p-4 rounded-2xl bg-emerald-500/10 border border-emerald-500/20">
                        <div class="flex justify-between text-[10px] uppercase font-bold text-slate-500 mb-1">
                            <span>Base de calcul (Net)</span>
                            <span id="res-sum-part"></span>
                        </div>
                        <div id="res-total" class="text-3xl font-black text-emerald-500"></div>
                    </div>
                </div>
                
                <div id="placeholder" class="glass-card rounded-3xl p-12 text-center border-dashed border-white/10 h-full flex flex-col items-center justify-center">
                    <i class="fa-solid fa-scale-balanced text-4xl text-slate-700 mb-4"></i>
                    <p class="text-slate-500 text-sm">Prêt pour l'analyse juridique...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let deceasedGender = 'male';

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            icon.className = document.documentElement.classList.contains('dark') ? "fa-solid fa-moon text-xl" : "fa-solid fa-sun text-xl";
        }

        function setGender(g) {
            deceasedGender = g;
            const gm = document.getElementById('gm');
            const gf = document.getElementById('gf');
            if(g === 'male') {
                gm.classList.add('border-blue-500', 'bg-blue-500/10');
                gf.classList.remove('border-pink-500', 'bg-pink-500/10');
                gf.classList.add('border-transparent');
                document.getElementById('spouse_label').innerText = "Épouse(s)";
            } else {
                gf.classList.add('border-pink-500', 'bg-pink-500/10');
                gm.classList.remove('border-blue-500', 'bg-blue-500/10');
                gm.classList.add('border-transparent');
                document.getElementById('spouse_label').innerText = "Époux";
            }
        }

        function toggleGP() {
            const f = document.getElementById('fth_alive').checked;
            const m = document.getElementById('mth_alive').checked;
            document.getElementById('gp_section').style.opacity = (f && m) ? "0.3" : "1";
        }

        function updateNet() {
            const a = parseFloat(document.getElementById('total_assets').value) || 0;
            const d = parseFloat(document.getElementById('total_debts').value) || 0;
            return Math.max(0, a - d);
        }

        function calculate() {
            const net = updateNet();
            if(net <= 0) return;

            // Inputs
            const sons = parseInt(document.getElementById('nb_sons').value) || 0;
            const dau = parseInt(document.getElementById('nb_dau').value) || 0;
            const sps = parseInt(document.getElementById('nb_spouses').value) || 0;
            const fth = document.getElementById('fth_alive').checked;
            const mth = document.getElementById('mth_alive').checked;
            const gfh = document.getElementById('gfh_alive').checked;
            const gmh = document.getElementById('gmh_alive').checked;
            const fg = parseInt(document.getElementById('nb_fg').value) || 0;
            const sg = parseInt(document.getElementById('nb_sg').value) || 0;
            const fc = parseInt(document.getElementById('nb_fc').value) || 0;
            const sc = parseInt(document.getElementById('nb_sc').value) || 0;
            const ut = parseInt(document.getElementById('nb_ut').value) || 0;

            let heirs = [];
            
            // Flags de blocage
            const hasDescMale = (sons > 0); 
            const hasDesc = (sons > 0 || dau > 0);
            const totalSiblings = (fg + sg + fc + sc + ut);

            // 1. PARTS FIXES (AS-HAB AL-FURUD)
            // Époux / Épouse
            if(sps > 0) {
                let p = (deceasedGender === 'male') ? (hasDesc ? 1/8 : 1/4) : (hasDesc ? 1/4 : 1/2);
                heirs.push({id: 'spouse', name: deceasedGender === 'male' ? "Épouse(s)" : "Époux", part: p, count: sps, type: 'f'});
            }

            // Mère
            if(mth) {
                let p = (hasDesc || totalSiblings >= 2) ? 1/6 : 1/3;
                // Cas spéciaux "Omariyatayn" (Mari/Femme + Père + Mère)
                if(!hasDesc && totalSiblings === 0 && fth) {
                    p = (1 - (heirs.find(h => h.id === 'spouse')?.part || 0)) / 3;
                }
                heirs.push({id: 'mother', name: "Mère", part: p, count: 1, type: 'f'});
            } else if (gmh && !mth) {
                heirs.push({id: 'gmother', name: "Grand-Mère", part: 1/6, count: 1, type: 'f'});
            }

            // Père (Fixe)
            if(fth) {
                if(hasDesc) heirs.push({id: 'father_f', name: "Père (Part fixe)", part: 1/6, count: 1, type: 'f'});
            } else if(gfh && !hasDescMale) {
                heirs.push({id: 'gfather_f', name: "Grand-Père (Part fixe)", part: 1/6, count: 1, type: 'f'});
            }

            // Filles (si pas de fils)
            if(sons === 0 && dau > 0) {
                heirs.push({id: 'daughters', name: "Fille(s)", part: (dau === 1 ? 1/2 : 2/3), count: dau, type: 'f'});
            }

            // Fratrie Utérine
            if(ut > 0 && !hasDesc && !fth && !gfh) {
                heirs.push({id: 'uterines', name: "Fratrie Utérine", part: (ut === 1 ? 1/6 : 1/3), count: ut, type: 'f'});
            }

            // 2. CALCUL SOMME POUR AWL
            let sumF = heirs.reduce((acc, h) => acc + h.part, 0);

            // 3. GESTION DE L'AWL (Dépassement)
            if(sumF > 1.0001) {
                heirs.forEach(h => h.part = h.part / sumF);
                document.getElementById('badge-status').innerText = "Al-Awl (Réduction)";
                sumF = 1;
            }

            // 4. LES ASABAS (RÉSIDUELS)
            let residue = Math.max(0, 1 - sumF);
            let hasAsaba = false;

            if(residue > 0.0001) {
                if(sons > 0) {
                    const shares = (sons * 2) + dau;
                    heirs.push({name: "Fils", part: (residue/shares)*2*sons, count: sons, type: 'a'});
                    if(dau > 0) heirs.push({name: "Fille(s) (Asaba)", part: (residue/shares)*dau, count: dau, type: 'a'});
                    hasAsaba = true;
                } else if(fth) {
                    heirs.push({id: 'father_a', name: "Père (Résidu/Asaba)", part: residue, count: 1, type: 'a'});
                    hasAsaba = true;
                } else if(gfh) {
                    heirs.push({id: 'gfather_a', name: "Grand-Père (Résidu)", part: residue, count: 1, type: 'a'});
                    hasAsaba = true;
                } else if(fg > 0 || sg > 0) {
                    const shares = (fg * 2) + sg;
                    heirs.push({name: "Frère(s) Germ.", part: (residue/shares)*2*fg, count: fg, type: 'a'});
                    if(sg > 0) heirs.push({name: "Sœur(s) Germ. (Asaba)", part: (residue/shares)*sg, count: sg, type: 'a'});
                    hasAsaba = true;
                } else if(fc > 0 || sc > 0) {
                    const shares = (fc * 2) + sc;
                    heirs.push({name: "Frère(s) Cons.", part: (residue/shares)*2*fc, count: fc, type: 'a'});
                    if(sc > 0) heirs.push({name: "Sœur(s) Cons. (Asaba)", part: (residue/shares)*sc, count: sc, type: 'a'});
                    hasAsaba = true;
                }
            }

            // 5. GESTION DU RADD (Retour)
            let finalSum = heirs.reduce((acc, h) => acc + h.part, 0);
            if(finalSum < 0.9999 && !hasAsaba) {
                // Le radd ne va pas aux époux selon l'avis majoritaire
                let raddHeirs = heirs.filter(h => h.id !== 'spouse');
                let raddSum = raddHeirs.reduce((acc, h) => acc + h.part, 0);
                if(raddSum > 0) {
                    let toDistribute = 1 - (heirs.find(h => h.id === 'spouse')?.part || 0);
                    raddHeirs.forEach(h => {
                        h.part = (h.part / raddSum) * toDistribute;
                    });
                }
                document.getElementById('badge-status').innerText = "Al-Radd (Retour)";
            } else if(hasAsaba) {
                document.getElementById('badge-status').innerText = "Al-Asaba (Résidu)";
            }

            render(heirs, net);
        }

        function render(heirs, total) {
            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('results-box').classList.remove('hidden');
            const list = document.getElementById('results-list');
            list.innerHTML = "";

            // Fusionner les lignes doublons (ex: Père fixe + Père asaba)
            let merged = {};
            heirs.forEach(h => {
                let key = h.name.split(' (')[0]; // On regroupe par nom principal
                if(!merged[key]) {
                    merged[key] = {...h, name: key};
                } else {
                    merged[key].part += h.part;
                }
            });

            Object.values(merged).filter(h => h.part > 0).forEach(h => {
                const el = document.createElement('div');
                el.className = "p-4 rounded-2xl bg-slate-500/5 border border-black/5 dark:border-white/5 flex justify-between items-center transition-all hover:bg-emerald-500/5";
                el.innerHTML = `
                    <div>
                        <p class="font-bold text-sm">${h.name} ${h.type === 'a' ? '⚡' : ''}</p>
                        <p class="text-[9px] opacity-60 uppercase font-black">${(h.part * 100).toFixed(2)}%</p>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-emerald-500">${(h.part * total).toLocaleString('fr-FR')} €</p>
                        <p class="text-[8px] opacity-40">${h.count > 1 ? (h.part*total/h.count).toLocaleString('fr-FR')+' / pers.' : 'Part unique'}</p>
                    </div>
                `;
                list.appendChild(el);
            });

            document.getElementById('res-total').innerText = total.toLocaleString('fr-FR') + " €";
            document.getElementById('res-sum-part').innerText = "Vérifié à 100%";
        }
    </script>
</body>
</html>
